name: CI

on:
  push:
    branches: [main, v0.4]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        python-version: ["3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install -e ".[dev,build]"
      - run: python -m ruff check src tests
      - run: python -m mypy src/octopus
      - run: python -m pytest --cov=octopus --cov-report=term-missing --cov-fail-under=85
      - run: python -m build
