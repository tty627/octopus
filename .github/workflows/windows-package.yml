name: Windows package

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  development-package:
    if: github.ref_type != 'tag' || contains(github.ref_name, '.dev')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: x64
          cache: pip
      - run: choco install innosetup --version=6.7.1 -y --no-progress
      - shell: pwsh
        run: .\packaging\install_inno_language.ps1
      - shell: pwsh
        run: |
          $buildParameters = @{ Python = "python" }
          if ($env:GITHUB_REF_TYPE -eq "tag") {
            $expectedVersion = $env:GITHUB_REF_NAME -replace '^v', ''
            $buildParameters.ExpectedVersion = $expectedVersion
          }
          & .\packaging\build_windows.ps1 @buildParameters
      - shell: pwsh
        run: |
          $version = (python -c "from octopus import __version__; print(__version__)").Trim()
          $installer = (Get-ChildItem release\*-setup.exe -File -ErrorAction Stop).FullName
          .\packaging\validate_windows_install.ps1 -Installer $installer -Checksums release\SHA256SUMS.txt -ExpectedVersion $version -Output release\windows-install-validation.json
          $hash = (Get-FileHash -Algorithm SHA256 release\windows-install-validation.json).Hash.ToLowerInvariant()
          Add-Content release\SHA256SUMS.txt "$hash *windows-install-validation.json"
      - name: Audit development release
        if: github.ref_type == 'tag'
        shell: pwsh
        run: |
          $expectedVersion = $env:GITHUB_REF_NAME -replace '^v', ''
          $auditOutput = Join-Path $env:RUNNER_TEMP "octopus-release-audit.json"
          python -m octopus release-audit --expected-version $expectedVersion --artifacts release |
            Out-File -LiteralPath $auditOutput -Encoding utf8
          $auditExitCode = $LASTEXITCODE
          if ($auditExitCode -ne 0) {
            Get-Content -LiteralPath $auditOutput
            throw "Release audit failed with exit code $auditExitCode"
          }
          Move-Item -LiteralPath $auditOutput -Destination release\release-audit.json -Force
          Get-Content -LiteralPath release\release-audit.json
          $audit = Get-Content -LiteralPath release\release-audit.json -Raw | ConvertFrom-Json
          if (-not $audit.engineering_passed) {
            throw "Release audit did not pass"
          }
          $hash = (Get-FileHash -Algorithm SHA256 release\release-audit.json).Hash.ToLowerInvariant()
          Add-Content release\SHA256SUMS.txt "$hash *release-audit.json"
          $expectedArtifacts = @(
            "build-manifest.json",
            "Octopus-$expectedVersion-win-x64-portable.zip",
            "Octopus-$expectedVersion-win-x64-setup.exe",
            "octopus_index-$expectedVersion-py3-none-any.whl",
            "octopus_index-$expectedVersion.tar.gz",
            "release-audit.json",
            "SHA256SUMS.txt",
            "windows-install-validation.json"
          )
          $actualArtifacts = @(Get-ChildItem -LiteralPath release -File | ForEach-Object Name)
          $missing = @($expectedArtifacts | Where-Object { $_ -notin $actualArtifacts })
          $unexpected = @($actualArtifacts | Where-Object { $_ -notin $expectedArtifacts })
          if ($actualArtifacts.Count -ne 8 -or $missing.Count -gt 0 -or $unexpected.Count -gt 0) {
            throw "Unexpected release asset set; missing=$($missing -join ','); unexpected=$($unexpected -join ',')"
          }
      - uses: actions/upload-artifact@v4
        with:
          name: octopus-windows-development
          path: release/*
      - name: Publish development prerelease
        if: github.ref_type == 'tag'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $expectedVersion = $env:GITHUB_REF_NAME -replace '^v', ''
          $notesPath = "docs\releases\v$expectedVersion.md"
          if (-not (Test-Path -LiteralPath $notesPath -PathType Leaf)) {
            throw "Versioned release notes are missing: $notesPath"
          }
          $title = "Octopus $expectedVersion (development preview)"
          & gh release view $env:GITHUB_REF_NAME --json id *> $null
          $releaseExists = $LASTEXITCODE -eq 0
          if ($releaseExists) {
            & gh release edit $env:GITHUB_REF_NAME --title $title --notes-file $notesPath --prerelease
          }
          else {
            & gh release create $env:GITHUB_REF_NAME --verify-tag --prerelease --title $title --notes-file $notesPath
          }
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to create or update release $env:GITHUB_REF_NAME"
          }
          $assetPaths = @(Get-ChildItem -LiteralPath release -File | Sort-Object Name | ForEach-Object FullName)
          & gh release upload $env:GITHUB_REF_NAME @assetPaths --clobber
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to upload release assets for $env:GITHUB_REF_NAME"
          }

  signed-release:
    if: github.ref_type == 'tag' && !contains(github.ref_name, '.dev')
    runs-on: windows-latest
    environment: code-signing
    steps:
      - name: Validate signing configuration
        shell: pwsh
        env:
          SIGNING_PFX_BASE64: ${{ secrets.SIGNING_PFX_BASE64 }}
          SIGNING_PFX_PASSWORD: ${{ secrets.SIGNING_PFX_PASSWORD }}
          SIGNING_TIMESTAMP_URL: ${{ vars.SIGNING_TIMESTAMP_URL }}
        run: |
          $missing = @()
          if ([string]::IsNullOrWhiteSpace($env:SIGNING_PFX_BASE64)) { $missing += "SIGNING_PFX_BASE64" }
          if ([string]::IsNullOrEmpty($env:SIGNING_PFX_PASSWORD)) { $missing += "SIGNING_PFX_PASSWORD" }
          if ([string]::IsNullOrWhiteSpace($env:SIGNING_TIMESTAMP_URL)) { $missing += "SIGNING_TIMESTAMP_URL" }
          if ($missing.Count -gt 0) {
            throw "Code-signing environment is incomplete: $($missing -join ', ')"
          }
          try {
            $certificateBytes = [Convert]::FromBase64String($env:SIGNING_PFX_BASE64)
          }
          catch {
            throw "SIGNING_PFX_BASE64 is not valid Base64"
          }
          if ($certificateBytes.Length -eq 0) { throw "SIGNING_PFX_BASE64 is empty" }
          [Array]::Clear($certificateBytes, 0, $certificateBytes.Length)
          $timestampUri = $null
          if (
            -not [Uri]::TryCreate(
              $env:SIGNING_TIMESTAMP_URL,
              [UriKind]::Absolute,
              [ref]$timestampUri
            ) -or $timestampUri.Scheme -ne "https"
          ) {
            throw "SIGNING_TIMESTAMP_URL must be an absolute HTTPS URL"
          }
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: x64
          cache: pip
      - run: choco install innosetup --version=6.7.1 -y --no-progress
      - shell: pwsh
        run: .\packaging\install_inno_language.ps1
      - id: certificate
        shell: pwsh
        env:
          SIGNING_PFX_BASE64: ${{ secrets.SIGNING_PFX_BASE64 }}
          SIGNING_PFX_PASSWORD: ${{ secrets.SIGNING_PFX_PASSWORD }}
        run: |
          $path = Join-Path $env:RUNNER_TEMP "octopus-signing.pfx"
          [IO.File]::WriteAllBytes($path, [Convert]::FromBase64String($env:SIGNING_PFX_BASE64))
          $password = ConvertTo-SecureString $env:SIGNING_PFX_PASSWORD -AsPlainText -Force
          $certificate = Import-PfxCertificate -FilePath $path -CertStoreLocation Cert:\CurrentUser\My -Password $password
          Remove-Item -LiteralPath $path -Force
          "thumbprint=$($certificate.Thumbprint)" >> $env:GITHUB_OUTPUT
      - shell: pwsh
        env:
          TIMESTAMP_URL: ${{ vars.SIGNING_TIMESTAMP_URL }}
        run: |
          $expectedVersion = $env:GITHUB_REF_NAME -replace '^v', ''
          .\packaging\build_windows.ps1 -Python python -Release -CertThumbprint "${{ steps.certificate.outputs.thumbprint }}" -TimestampUrl $env:TIMESTAMP_URL -ExpectedVersion $expectedVersion
      - shell: pwsh
        run: |
          $expectedVersion = $env:GITHUB_REF_NAME -replace '^v', ''
          $installer = (Get-ChildItem release\*-setup.exe -File -ErrorAction Stop).FullName
          .\packaging\validate_windows_install.ps1 -Installer $installer -Checksums release\SHA256SUMS.txt -ExpectedVersion $expectedVersion -RequireSignature -Output release\windows-install-validation.json
          $hash = (Get-FileHash -Algorithm SHA256 release\windows-install-validation.json).Hash.ToLowerInvariant()
          Add-Content release\SHA256SUMS.txt "$hash *windows-install-validation.json"
      - name: Audit signed release
        shell: pwsh
        run: |
          $expectedVersion = $env:GITHUB_REF_NAME -replace '^v', ''
          $auditOutput = Join-Path $env:RUNNER_TEMP "octopus-release-audit.json"
          python -m octopus release-audit --expected-version $expectedVersion --artifacts release |
            Out-File -LiteralPath $auditOutput -Encoding utf8
          $auditExitCode = $LASTEXITCODE
          if ($auditExitCode -ne 0) {
            Get-Content -LiteralPath $auditOutput
            throw "Release audit failed with exit code $auditExitCode"
          }
          Move-Item -LiteralPath $auditOutput -Destination release\release-audit.json -Force
          Get-Content -LiteralPath release\release-audit.json
          $audit = Get-Content -LiteralPath release\release-audit.json -Raw | ConvertFrom-Json
          if (-not $audit.engineering_passed) {
            throw "Release audit did not pass"
          }
          $hash = (Get-FileHash -Algorithm SHA256 release\release-audit.json).Hash.ToLowerInvariant()
          Add-Content release\SHA256SUMS.txt "$hash *release-audit.json"
          $expectedArtifacts = @(
            "build-manifest.json",
            "Octopus-$expectedVersion-win-x64-portable.zip",
            "Octopus-$expectedVersion-win-x64-setup.exe",
            "octopus_index-$expectedVersion-py3-none-any.whl",
            "octopus_index-$expectedVersion.tar.gz",
            "release-audit.json",
            "SHA256SUMS.txt",
            "windows-install-validation.json"
          )
          $actualArtifacts = @(Get-ChildItem -LiteralPath release -File | ForEach-Object Name)
          $missing = @($expectedArtifacts | Where-Object { $_ -notin $actualArtifacts })
          $unexpected = @($actualArtifacts | Where-Object { $_ -notin $expectedArtifacts })
          if ($actualArtifacts.Count -ne 8 -or $missing.Count -gt 0 -or $unexpected.Count -gt 0) {
            throw "Unexpected release asset set; missing=$($missing -join ','); unexpected=$($unexpected -join ',')"
          }
      - uses: actions/upload-artifact@v4
        with:
          name: octopus-windows-signed
          path: release/*
      - shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $expectedVersion = $env:GITHUB_REF_NAME -replace '^v', ''
          $notesPath = "docs\releases\v$expectedVersion.md"
          if (-not (Test-Path -LiteralPath $notesPath -PathType Leaf)) {
            throw "Versioned release notes are missing: $notesPath"
          }
          $title = "Octopus $expectedVersion"
          $isPrerelease = $env:GITHUB_REF_NAME -match '(a|b|rc)\d+$'
          & gh release view $env:GITHUB_REF_NAME --json id *> $null
          $releaseExists = $LASTEXITCODE -eq 0
          if ($releaseExists) {
            $releaseArguments = @("release", "edit", $env:GITHUB_REF_NAME, "--title", $title, "--notes-file", $notesPath)
          }
          else {
            $releaseArguments = @("release", "create", $env:GITHUB_REF_NAME, "--verify-tag", "--title", $title, "--notes-file", $notesPath)
          }
          if ($isPrerelease) {
            $releaseArguments += "--prerelease"
          }
          & gh @releaseArguments
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to create or update release $env:GITHUB_REF_NAME"
          }
          $assetPaths = @(Get-ChildItem -LiteralPath release -File | Sort-Object Name | ForEach-Object FullName)
          & gh release upload $env:GITHUB_REF_NAME @assetPaths --clobber
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to upload release assets for $env:GITHUB_REF_NAME"
          }
